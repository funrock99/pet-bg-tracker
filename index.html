<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寵物血糖紀錄趨勢圖</title>
    <!-- Pico.css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --spacing: 1rem; }
        body { padding: var(--spacing); }
        .container { max-width: 900px; }
        canvas { background: #fff; border-radius: 8px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .loading { text-align: center; padding: 2rem; }
        .filter-container { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
        .filter-container select { margin-bottom: 0; flex: 1; }
        .filter-container label { margin-bottom: 0; white-space: nowrap; font-weight: bold; }
    </style>
</head>
<body>
    <main class="container">
        <hgroup>
            <h1>🐾 寵物血糖監測系統</h1>
            <h2>歷史數據趨勢分析</h2>
        </hgroup>

        <div class="filter-container" id="filter-section" style="display: none;">
            <label for="petSelector">選擇寵物：</label>
            <select id="petSelector" onchange="filterChart()">
                <!-- 動態生成選項 -->
            </select>
        </div>

        <article id="chart-container">
            <div id="loader" class="loading">
                <p aria-busy="true">正在從 Notion 讀取數據...</p>
            </div>
            <canvas id="bgChart" style="display: none;"></canvas>
        </article>

        <footer style="margin-top: 2rem; text-align: center;">
            <small>資料來源：Notion Database | 由 Google Apps Script 強力驅動</small>
        </footer>
    </main>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbw18-mYPD1Fg7AHCb6d5Fk-1AEstyNT0zxg-q3xTzY9i7F8hA_cgPYRsTTHlPeJ8plM8w/exec';
        // 安全檢查：從網址參數取得金鑰 (?key=你的金鑰)
        const urlParams = new URLSearchParams(window.location.search);
        const APP_KEY = urlParams.get('key') || 'my-secret-key'; 
        
        let allData = [];
        let chartInstance = null;

        async function initChart() {
            try {
                const response = await fetch(`${GAS_URL}?action=getData&key=${APP_KEY}`);
                if (!response.ok) throw new Error('網路連線失敗');
                
                const result = await response.json();
                
                // 檢查是否回傳錯誤訊息 (例如 Unauthorized)
                if (result.status === 'error') {
                    throw new Error(`驗證失敗: ${result.message}`);
                }
                
                // 確保 result 是陣列
                if (!Array.isArray(result)) {
                    throw new Error('回傳格式錯誤 (非陣列)');
                }
                
                allData = result;
                
                if (allData.length === 0) {
                    document.getElementById('loader').innerHTML = '<p>尚無紀錄數據。</p>';
                    return;
                }

                // 提取所有不重複的寵物名字
                const petNames = [...new Set(allData.map(item => item.pet))];
                const selector = document.getElementById('petSelector');
                
                // 清空並生成選項
                selector.innerHTML = petNames.map(name => `<option value="${name}">${name}</option>`).join('');
                
                // 如果有多於一隻寵物，才顯示篩選器
                if (petNames.length > 0) {
                    document.getElementById('filter-section').style.display = 'flex';
                }

                // 初始繪圖（預設顯示第一隻寵物）
                renderChart(petNames[0]);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loader').innerHTML = `<p style="color: red;">讀取失敗: ${error.message}<br>請確認 GAS 已正確部署並開啟權限。</p>`;
            }
        }

        function filterChart() {
            const selectedPet = document.getElementById('petSelector').value;
            renderChart(selectedPet);
        }

        function renderChart(petName) {
            const filteredData = allData.filter(item => item.pet === petName);
            
            const labels = filteredData.map(item => new Date(item.time).toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }));
            const values = filteredData.map(item => item.bg);
            const insulins = filteredData.map(item => item.insulin);
            const foods = filteredData.map(item => item.food);
            const notes = filteredData.map(item => item.note);

            document.getElementById('loader').style.display = 'none';
            const ctx = document.getElementById('bgChart');
            ctx.style.display = 'block';

            // 如果已有圖表，先銷毀
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `${petName} 的血糖值 (mg/dL)`,
                        data: values,
                        borderColor: '#1DB446',
                        backgroundColor: 'rgba(29, 180, 70, 0.1)',
                        borderWidth: 3,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 5,
                        pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                afterBody: function(context) {
                                    const index = context[0].dataIndex;
                                    let extra = `胰島素: ${insulins[index]} U\n餵食量: ${foods[index]} g`;
                                    if (notes[index] && notes[index] !== "無") {
                                        extra += `\n備註: ${notes[index]}`;
                                    }
                                    return extra;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: { display: true, text: 'mg/dL' }
                        }
                    }
                }
            });
        }

        if (GAS_URL === 'YOUR_GAS_WEB_APP_URL') {
            document.getElementById('loader').innerHTML = '<p style="color: orange;">⚠️ 請先在 index.html 中設定 GAS_URL</p>';
        } else {
            initChart();
        }
    </script>
</body>
</html>
